# =============================================================================
# Workflow #3: Verify Published Package
#
# Manually triggered. Installs zvec from pub.dev, builds the example app,
# and verifies native libraries are correctly bundled.
#   - Android: Build APK + static validation (checks libzvec.so exists
#     with correct ELF format for arm64-v8a)
#   - iOS: Device build (no codesign) + verify zvec.framework exists
#     with correct arm64 architecture
#
# NOTE: iOS verification uses device build (not simulator) because the
# native library is compiled for arm64 device architecture, which is
# incompatible with simulator (x86_64 / arm64-simulator).
#
# Prerequisite: Workflow #2 completed successfully, package available on pub.dev.
#
# Trigger: GitHub Actions → Run workflow → Enter tag (e.g. v0.1.0)
# =============================================================================
name: "3 - Verify Published Package"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to verify (e.g. v0.1.0)"
        required: true
        type: string

jobs:
  # =========================================================================
  # Android: Build APK and validate native libraries (static check)
  # =========================================================================
  verify-android:
    name: Verify Android (APK static check)
    runs-on: ubuntu-latest
    env:
      TAG_VERSION: ${{ github.event.inputs.tag }}
    steps:
      - name: Checkout (for example app)
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Switch example to pub.dev dependency
        working-directory: example
        run: |
          # Replace path dependency with pub.dev version constraint
          cat > /tmp/fix_dep.py << 'PYEOF'
          import re, pathlib
          p = pathlib.Path('pubspec.yaml')
          txt = p.read_text()
          txt = re.sub(
              r'zvec:\n(\s+#[^\n]*\n)*\s+path: \.\./\n',
              'zvec: ^$VERSION\n',
              txt
          )
          p.write_text(txt)
          PYEOF
          TAG_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          sed -i "s/\$VERSION/${TAG_VERSION}/" /tmp/fix_dep.py
          python3 /tmp/fix_dep.py
          echo "Updated pubspec.yaml:"
          grep -A2 'zvec:' pubspec.yaml
          flutter pub get

      - name: Build APK
        working-directory: example
        run: flutter build apk --debug

      - name: Verify APK contents
        working-directory: example
        run: |
          APK="build/app/outputs/flutter-apk/app-debug.apk"

          echo "=== APK size ==="
          ls -lh "$APK"

          echo ""
          echo "=== Native libraries in APK ==="
          unzip -l "$APK" | grep '\.so$'

          echo ""
          echo "=== Verify libzvec.so for arm64-v8a ==="
          # NOTE: armeabi-v7a is not supported because upstream zvec
          # unconditionally appends -march=armv8 flags.
          # See: cmake/option.cmake _setup_armv8_march()
          if unzip -l "$APK" | grep -q "lib/arm64-v8a/libzvec.so"; then
            unzip -o -j "$APK" "lib/arm64-v8a/libzvec.so" -d /tmp/verify_arm64
            FILE_INFO=$(file /tmp/verify_arm64/libzvec.so)
            echo "✅ lib/arm64-v8a/libzvec.so — $FILE_INFO"

            if echo "$FILE_INFO" | grep -q "ELF.*shared object"; then
              echo "   Format: valid ELF shared object"
            else
              echo "::error::Unexpected format for libzvec.so"
              exit 1
            fi
          else
            echo "::error::❌ lib/arm64-v8a/libzvec.so NOT FOUND in APK"
            exit 1
          fi

  # =========================================================================
  # iOS: Device build (no codesign) and verify framework
  #
  # We do NOT build for simulator because the native library (libzvec) is
  # compiled for arm64 device only. Simulator requires x86_64 or
  # arm64-simulator slices which are not provided.
  # =========================================================================
  verify-ios:
    name: Verify iOS (device build, no codesign)
    runs-on: macos-14
    env:
      TAG_VERSION: ${{ github.event.inputs.tag }}
    steps:
      - name: Checkout (for example app)
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Switch example to pub.dev dependency
        working-directory: example
        run: |
          cat > /tmp/fix_dep.py << 'PYEOF'
          import re, pathlib
          p = pathlib.Path('pubspec.yaml')
          txt = p.read_text()
          txt = re.sub(
              r'zvec:\n(\s+#[^\n]*\n)*\s+path: \.\./\n',
              'zvec: ^$VERSION\n',
              txt
          )
          p.write_text(txt)
          PYEOF
          TAG_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          sed -i '' "s/\$VERSION/${TAG_VERSION}/" /tmp/fix_dep.py
          python3 /tmp/fix_dep.py
          echo "Updated pubspec.yaml:"
          grep -A2 'zvec:' pubspec.yaml
          flutter pub get

      - name: Build iOS (device, no codesign)
        working-directory: example
        run: flutter build ios --no-codesign

      - name: Verify zvec.framework
        working-directory: example
        run: |
          echo "=== Searching for zvec.framework ==="
          FRAMEWORK=$(find build -name "zvec.framework" -type d | head -1)
          if [ -z "$FRAMEWORK" ]; then
            echo "::error::❌ zvec.framework NOT found in build output"
            exit 1
          fi

          echo "✅ Found: $FRAMEWORK"
          BINARY="$FRAMEWORK/zvec"

          echo ""
          echo "=== File info ==="
          file "$BINARY"

          echo ""
          echo "=== Architecture check ==="
          lipo -info "$BINARY"

          # Verify arm64 is present
          if lipo -info "$BINARY" | grep -q "arm64"; then
            echo "✅ arm64 architecture confirmed"
          else
            echo "::error::❌ arm64 architecture NOT found in zvec.framework"
            exit 1
          fi

  # =========================================================================
  # Summary
  # =========================================================================
  summary:
    name: Verification summary
    needs: [verify-android, verify-ios]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "============================================"
          echo "  ✅ Package ${{ github.event.inputs.tag }} fully verified!"
          echo ""
          echo "  Android: APK contains arm64-v8a libzvec.so (valid ELF)"
          echo "  iOS:     zvec.framework present with arm64 architecture"
          echo "============================================"
