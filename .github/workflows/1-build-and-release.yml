# =============================================================================
# Workflow: Build Native Libraries, Create GitHub Release & Publish to pub.dev
#
# Triggered by pushing a version tag (e.g. v0.1.0). Compiles native
# libraries for all platforms, packages them as zip files, uploads
# to GitHub Releases, and publishes the Dart package to pub.dev.
#
# Prerequisites:
#   - pubspec.yaml version matches the tag (e.g. tag v0.1.0 → version: 0.1.0)
#   - CHANGELOG.md mentions the version
#   - pub.dev: Enable automated publishing from GitHub Actions
#     (Repository: zvec-ai/zvec-dart, Tag pattern: v{{version}})
#
# Trigger: git tag v0.1.0 && git push origin v0.1.0
# =============================================================================
name: "Build, Release & Publish"

on:
  push:
    tags:
      - 'v*'

env:
  # Extract version from tag: v0.1.0 → 0.1.0
  ZVEC_VERSION: ${{ github.ref_name }}

jobs:
  # =========================================================================
  # Build Android — runs in parallel with iOS
  #
  # NOTE: armeabi-v7a is currently disabled. Upstream zvec cmake
  # (cmake/option.cmake _setup_armv8_march) unconditionally appends
  # -march=armv8 to CFLAGS, which conflicts with the NDK's -march=armv7-a
  # for 32-bit ARM targets, causing lz4 and other thirdparty builds to fail.
  # Re-enable when upstream fixes arch flag handling for armv7.
  # =========================================================================
  build-android:
    name: Build Android
    runs-on: macos-14
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify version consistency
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          # Strip 'v' prefix from tag: v0.1.0 → 0.1.0
          TAG_VERSION="${ZVEC_VERSION#v}"
          echo "pubspec.yaml version: $PUBSPEC_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! pubspec.yaml=$PUBSPEC_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      # Pre-build host protoc BEFORE build_android.sh, because the script
      # exports CMAKE_TOOLCHAIN_FILE (Android) before building host protoc,
      # causing protoc to be cross-compiled for Android and fail to execute.
      - name: Pre-build host protoc
        run: |
          cd third_party/zvec
          git submodule foreach --recursive 'git stash --include-untracked 2>/dev/null || true' > /dev/null 2>&1
          cd $GITHUB_WORKSPACE
          mkdir -p build/host && cd build/host
          cmake -DCMAKE_BUILD_TYPE=Release "$GITHUB_WORKSPACE/third_party/zvec"
          make -j$(sysctl -n hw.ncpu) protoc

      - name: Build Android arm64-v8a
        run: bash scripts/build_android.sh arm64-v8a 21 Release

      - name: Verify Android artifacts
        run: |
          file android/src/main/jniLibs/arm64-v8a/libzvec.so
          ls -lh build/release/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-v8a
          path: build/release/libzvec-android-arm64-v8a.zip

  # =========================================================================
  # Build iOS (arm64 device) — runs in parallel with Android
  # =========================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-14
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Build iOS arm64
        run: bash scripts/build_ios.sh OS Release

      - name: Verify iOS artifacts
        run: |
          file ios/zvec.framework/zvec
          ls -lh build/release/

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs
          path: build/release/zvec-framework-ios.zip

  # =========================================================================
  # Create GitHub Release — waits for both builds to succeed
  # =========================================================================
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Verify all artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## Prebuilt native libraries

          | Platform | ABI | File |
          |----------|-----|------|
          | Android | arm64-v8a | libzvec-android-arm64-v8a.zip |
          | iOS | arm64 | zvec-framework-ios.zip |

          These binaries are automatically downloaded during `flutter build`.
          EOF

          gh release create "${ZVEC_VERSION}" \
            artifacts/libzvec-android-arm64-v8a.zip \
            artifacts/zvec-framework-ios.zip \
            --repo "${{ github.repository }}" \
            --title "${ZVEC_VERSION}" \
            --notes-file /tmp/release_notes.md

  # =========================================================================
  # Publish to pub.dev — after GitHub Release is created
  #
  # Uses OIDC trusted publishing (dart-lang/setup-dart) which requires
  # the workflow to run on a 'push' or 'workflow_dispatch' event.
  # =========================================================================
  publish:
    name: Publish to pub.dev
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4

      - name: Setup Dart (for OIDC publishing)
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify version consistency
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG_VERSION="${ZVEC_VERSION#v}"
          echo "pubspec.yaml version: $PUBSPEC_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! pubspec.yaml=$PUBSPEC_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Remove submodule gitlink for pub validation
        run: |
          # Workaround for dart pub bug (dart-lang/pub#3789):
          # pub incorrectly warns about submodule gitlink entries being gitignored.
          git rm --cached third_party/zvec

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish --force
