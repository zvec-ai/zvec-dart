# =============================================================================
# Workflow #1: Build Native Libraries & Upload to GitHub Releases
#
# Manually triggered. Compiles native libraries for all platforms,
# packages them as zip files, and uploads to GitHub Releases.
# Must complete successfully before Workflow #2 (publish to pub.dev).
#
# Trigger: GitHub Actions → Run workflow → Enter version
# =============================================================================
name: "1 - Build & Release Native Libs"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0, without v prefix)"
        required: true
        type: string

env:
  ZVEC_VERSION: ${{ github.event.inputs.version }}

jobs:
  # =========================================================================
  # Build Android (per-ABI matrix) — runs in parallel with iOS
  # =========================================================================
  build-android:
    name: Build Android (${{ matrix.abi }})
    runs-on: macos-14
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      # Pre-build host protoc BEFORE build_android.sh, because the script
      # exports CMAKE_TOOLCHAIN_FILE (Android) before building host protoc,
      # causing protoc to be cross-compiled for Android and fail to execute.
      - name: Pre-build host protoc
        run: |
          cd third_party/zvec
          git submodule foreach --recursive 'git stash --include-untracked 2>/dev/null || true' > /dev/null 2>&1
          cd $GITHUB_WORKSPACE
          mkdir -p build/host && cd build/host
          cmake -DCMAKE_BUILD_TYPE=Release "$GITHUB_WORKSPACE/third_party/zvec"
          make -j$(sysctl -n hw.ncpu) protoc

      - name: Build Android ${{ matrix.abi }}
        run: bash scripts/build_android.sh ${{ matrix.abi }} 21 Release

      - name: Verify Android artifacts
        run: |
          file android/src/main/jniLibs/${{ matrix.abi }}/libzvec.so
          ls -lh build/release/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: build/release/libzvec-android-${{ matrix.abi }}.zip

  # =========================================================================
  # Build iOS (arm64 device) — runs in parallel with Android
  # =========================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-14
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Build iOS arm64
        run: bash scripts/build_ios.sh OS Release

      - name: Verify iOS artifacts
        run: |
          file ios/zvec.framework/zvec
          ls -lh build/release/

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs
          path: build/release/zvec-framework-ios.zip

  # =========================================================================
  # Create GitHub Release — waits for both builds to succeed
  # =========================================================================
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Verify all artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## Prebuilt native libraries

          | Platform | ABI | File |
          |----------|-----|------|
          | Android | arm64-v8a | libzvec-android-arm64-v8a.zip |
          | Android | armeabi-v7a | libzvec-android-armeabi-v7a.zip |
          | iOS | arm64 | zvec-framework-ios.zip |

          These binaries are automatically downloaded during `flutter build`.
          EOF

          gh release create "v${ZVEC_VERSION}" \
            artifacts/libzvec-android-arm64-v8a.zip \
            artifacts/libzvec-android-armeabi-v7a.zip \
            artifacts/zvec-framework-ios.zip \
            --repo "${{ github.repository }}" \
            --title "v${ZVEC_VERSION}" \
            --notes-file /tmp/release_notes.md
