# =============================================================================
# Workflow #1: Build Native Libraries & Upload to GitHub Releases
#
# Manually triggered. Compiles native libraries for all platforms,
# packages them as zip files, and uploads to GitHub Releases.
# Must complete successfully before Workflow #2 (publish to pub.dev).
#
# Trigger: GitHub Actions → Run workflow → Enter version
# =============================================================================
name: "1 - Build & Release Native Libs"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0, without v prefix)"
        required: true
        type: string

env:
  ZVEC_VERSION: ${{ github.event.inputs.version }}

jobs:
  build:
    name: Build native libraries (macOS)
    runs-on: macos-14  # Apple Silicon for iOS + Android cross-compilation
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Build Android (arm64-v8a + armeabi-v7a)
      # -----------------------------------------------------------------------
      - name: Build Android arm64-v8a
        run: bash scripts/build_android.sh arm64-v8a 21 Release

      - name: Build Android armeabi-v7a
        run: bash scripts/build_android.sh armeabi-v7a 21 Release

      # -----------------------------------------------------------------------
      # Build iOS (arm64 device)
      # -----------------------------------------------------------------------
      - name: Build iOS arm64
        run: bash scripts/build_ios.sh OS Release

      # -----------------------------------------------------------------------
      # Verify artifacts
      # -----------------------------------------------------------------------
      - name: Verify build artifacts
        run: |
          echo "=== Android ==="
          file android/src/main/jniLibs/arm64-v8a/libzvec.so
          file android/src/main/jniLibs/armeabi-v7a/libzvec.so
          echo "=== iOS ==="
          file ios/zvec.framework/zvec
          echo "=== Release zips ==="
          ls -lh build/release/

      # -----------------------------------------------------------------------
      # Create GitHub Release & upload zips
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## Prebuilt native libraries

          | Platform | ABI | File |
          |----------|-----|------|
          | Android | arm64-v8a | libzvec-android-arm64-v8a.zip |
          | Android | armeabi-v7a | libzvec-android-armeabi-v7a.zip |
          | iOS | arm64 | zvec-framework-ios.zip |

          These binaries are automatically downloaded during `flutter build`.
          EOF

          gh release create "v${ZVEC_VERSION}" \
            build/release/libzvec-android-arm64-v8a.zip \
            build/release/libzvec-android-armeabi-v7a.zip \
            build/release/zvec-framework-ios.zip \
            --title "v${ZVEC_VERSION}" \
            --notes-file /tmp/release_notes.md
