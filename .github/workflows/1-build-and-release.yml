# =============================================================================
# Workflow: Build Native Libraries, Create GitHub Release & Publish to pub.dev
#
# Triggered by pushing a version tag (e.g. v0.1.0). Compiles native
# libraries for all platforms, packages them as zip files, uploads
# to GitHub Releases, and publishes the Dart package to pub.dev.
#
# Prerequisites:
#   - pubspec.yaml version matches the tag (e.g. tag v0.1.0 → version: 0.1.0)
#   - CHANGELOG.md mentions the version
#   - pub.dev: Enable automated publishing from GitHub Actions
#     (Repository: zvec-ai/zvec-dart, Tag pattern: v{{version}})
#
# Trigger: git tag v0.1.0 && git push origin v0.1.0
# =============================================================================
name: "Build, Release & Publish"

on:
  push:
    tags:
      - 'v*'

env:
  # Extract version from tag: v0.1.0 → 0.1.0
  ZVEC_VERSION: ${{ github.ref_name }}

jobs:
  # =========================================================================
  # Build Android — runs in parallel with iOS
  #
  # NOTE: armeabi-v7a is currently disabled. Upstream zvec cmake
  # (cmake/option.cmake _setup_armv8_march) unconditionally appends
  # -march=armv8 to CFLAGS, which conflicts with the NDK's -march=armv7-a
  # for 32-bit ARM targets, causing lz4 and other thirdparty builds to fail.
  # Re-enable when upstream fixes arch flag handling for armv7.
  # =========================================================================
  build-android:
    name: Build Android
    runs-on: macos-14
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch submodule tags
        run: cd third_party/zvec && git fetch --tags

      - name: Verify version consistency
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          # Strip 'v' prefix from tag: v0.1.0 → 0.1.0
          TAG_VERSION="${ZVEC_VERSION#v}"
          echo "pubspec.yaml version: $PUBSPEC_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! pubspec.yaml=$PUBSPEC_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      # Pre-build host protoc BEFORE build_android.sh, because the script
      # exports CMAKE_TOOLCHAIN_FILE (Android) before building host protoc,
      # causing protoc to be cross-compiled for Android and fail to execute.
      - name: Pre-build host protoc
        run: |
          cd third_party/zvec
          git submodule foreach --recursive 'git stash --include-untracked 2>/dev/null || true' > /dev/null 2>&1
          cd $GITHUB_WORKSPACE
          mkdir -p build/host && cd build/host
          cmake -DCMAKE_BUILD_TYPE=Release "$GITHUB_WORKSPACE/third_party/zvec"
          make -j$(sysctl -n hw.ncpu) protoc

      - name: Build Android arm64-v8a
        run: bash scripts/build_android.sh arm64-v8a 21 Release

      - name: Verify Android artifacts
        run: |
          file android/src/main/jniLibs/arm64-v8a/libzvec.so
          ls -lh build/release/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-v8a
          path: build/release/libzvec-android-arm64-v8a.zip

  # =========================================================================
  # Build iOS (arm64 device) — runs in parallel with Android
  # =========================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-14
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch submodule tags
        run: cd third_party/zvec && git fetch --tags

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Build iOS arm64
        run: bash scripts/build_ios.sh OS Release

      - name: Verify iOS artifacts
        run: |
          file ios/zvec.framework/zvec
          ls -lh build/release/

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs
          path: build/release/zvec-framework-ios.zip

  # =========================================================================
  # Create GitHub Release — waits for both builds to succeed
  # =========================================================================
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Verify all artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          ## Prebuilt native libraries

          | Platform | ABI | File |
          |----------|-----|------|
          | Android | arm64-v8a | libzvec-android-arm64-v8a.zip |
          | iOS | arm64 | zvec-framework-ios.zip |

          These binaries are automatically downloaded during `flutter build`.
          EOF

          gh release create "${ZVEC_VERSION}" \
            artifacts/libzvec-android-arm64-v8a.zip \
            artifacts/zvec-framework-ios.zip \
            --repo "${{ github.repository }}" \
            --title "${ZVEC_VERSION}" \
            --notes-file /tmp/release_notes.md

  # =========================================================================
  # Publish to pub.dev — after GitHub Release is created
  #
  # Uses OIDC trusted publishing (dart-lang/setup-dart) which requires
  # the workflow to run on a 'push' or 'workflow_dispatch' event.
  # =========================================================================
  publish:
    name: Publish to pub.dev
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4

      - name: Setup Dart (for OIDC publishing)
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify version consistency
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG_VERSION="${ZVEC_VERSION#v}"
          echo "pubspec.yaml version: $PUBSPEC_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! pubspec.yaml=$PUBSPEC_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Remove submodule gitlink for pub validation
        run: |
          # Workaround for dart pub bug (dart-lang/pub#3789):
          # pub incorrectly warns about submodule gitlink entries being gitignored.
          git rm --cached third_party/zvec

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish --force

  # =========================================================================
  # Verify published package — install from pub.dev and build example app
  #
  # Waits for pub.dev indexing (~2 min), then builds example for both
  # Android and iOS to verify native libraries are correctly bundled.
  # =========================================================================
  verify-android:
    name: Verify Android (APK static check)
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for example app)
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Wait for pub.dev indexing
        run: sleep 120

      - name: Switch example to pub.dev dependency
        working-directory: example
        run: |
          TAG_VERSION="${ZVEC_VERSION#v}"
          cat > /tmp/fix_dep.py << PYEOF
          import re, pathlib
          p = pathlib.Path('pubspec.yaml')
          txt = p.read_text()
          txt = re.sub(
              r'zvec:\n(\s+#[^\n]*\n)*\s+path: \.\./\n',
              'zvec: ^${TAG_VERSION}\n',
              txt
          )
          p.write_text(txt)
          PYEOF
          python3 /tmp/fix_dep.py
          echo "Updated pubspec.yaml:"
          grep -A2 'zvec:' pubspec.yaml
          flutter pub get

      - name: Build APK
        working-directory: example
        run: flutter build apk --debug

      - name: Verify APK contents
        working-directory: example
        run: |
          APK="build/app/outputs/flutter-apk/app-debug.apk"
          echo "=== APK size ==="
          ls -lh "$APK"
          echo ""
          echo "=== Native libraries in APK ==="
          unzip -l "$APK" | grep '\.so$'
          echo ""
          echo "=== Verify libzvec.so for arm64-v8a ==="
          if unzip -l "$APK" | grep -q "lib/arm64-v8a/libzvec.so"; then
            unzip -o -j "$APK" "lib/arm64-v8a/libzvec.so" -d /tmp/verify_arm64
            FILE_INFO=$(file /tmp/verify_arm64/libzvec.so)
            echo "arm64-v8a/libzvec.so — $FILE_INFO"
            if echo "$FILE_INFO" | grep -q "ELF.*shared object"; then
              echo "Format: valid ELF shared object"
            else
              echo "::error::Unexpected format for libzvec.so"
              exit 1
            fi
          else
            echo "::error::lib/arm64-v8a/libzvec.so NOT FOUND in APK"
            exit 1
          fi

  verify-ios:
    name: Verify iOS (device build, no codesign)
    needs: [publish]
    runs-on: macos-14
    steps:
      - name: Checkout (for example app)
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Wait for pub.dev indexing
        run: sleep 120

      - name: Switch example to pub.dev dependency
        working-directory: example
        run: |
          TAG_VERSION="${ZVEC_VERSION#v}"
          cat > /tmp/fix_dep.py << PYEOF
          import re, pathlib
          p = pathlib.Path('pubspec.yaml')
          txt = p.read_text()
          txt = re.sub(
              r'zvec:\n(\s+#[^\n]*\n)*\s+path: \.\./\n',
              'zvec: ^${TAG_VERSION}\n',
              txt
          )
          p.write_text(txt)
          PYEOF
          python3 /tmp/fix_dep.py
          echo "Updated pubspec.yaml:"
          grep -A2 'zvec:' pubspec.yaml
          flutter pub get

      - name: Generate iOS platform files
        working-directory: example
        run: |
          flutter create --platforms=ios .
          # zvec requires iOS 14.0+ — uncomment and set platform line
          sed -i '' "s/^# *platform :ios.*/platform :ios, '14.0'/" ios/Podfile
          sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/" ios/Podfile
          grep 'platform :ios' ios/Podfile

      - name: Build iOS (device, no codesign)
        working-directory: example
        run: flutter build ios --no-codesign

      - name: Verify zvec.framework
        working-directory: example
        run: |
          echo "=== Searching for zvec.framework ==="
          FRAMEWORK=$(find build -name "zvec.framework" -type d | head -1)
          if [ -z "$FRAMEWORK" ]; then
            echo "::error::zvec.framework NOT found in build output"
            exit 1
          fi
          echo "Found: $FRAMEWORK"
          BINARY="$FRAMEWORK/zvec"
          echo ""
          echo "=== Architecture check ==="
          lipo -info "$BINARY"
          if lipo -info "$BINARY" | grep -q "arm64"; then
            echo "arm64 architecture confirmed"
          else
            echo "::error::arm64 architecture NOT found in zvec.framework"
            exit 1
          fi

  verify-summary:
    name: Verification summary
    needs: [verify-android, verify-ios]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "============================================"
          echo "  Package ${ZVEC_VERSION} fully verified!"
          echo ""
          echo "  Android: APK contains arm64-v8a libzvec.so (valid ELF)"
          echo "  iOS:     zvec.framework present with arm64 architecture"
          echo "============================================"
