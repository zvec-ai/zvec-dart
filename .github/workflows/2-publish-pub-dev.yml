# =============================================================================
# Workflow #2: Publish Dart Package to pub.dev
#
# Automatically triggered after Workflow #1 (Build & Release) succeeds.
# Publishes the Dart package to pub.dev using OIDC trusted publishing.
#
# One-time setup on pub.dev before first use:
#   pub.dev → Package Admin → Enable automated publishing from GitHub Actions
#   Repository: zvec-ai/zvec-dart
#   Tag pattern: v{{version}}
#
# Trigger: Automatic (after Workflow #1 completes on a tag push)
# =============================================================================
name: "2 - Publish to pub.dev"

on:
  workflow_run:
    workflows: ["1 - Build & Release Native Libs"]
    types: [completed]

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    # Only run if Workflow #1 succeeded and was triggered by a tag push
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Dart (for OIDC publishing)
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Verify version consistency
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "pubspec.yaml version: $PUBSPEC_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! pubspec.yaml=$PUBSPEC_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Verify GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "Checking GitHub Release $TAG ..."
          gh release view "$TAG" --json assets --jq '.assets[].name'
          echo "✅ Release assets verified."

      - name: Remove submodule gitlink for pub validation
        run: |
          # Workaround for dart pub bug (dart-lang/pub#3789):
          # pub incorrectly warns about submodule gitlink entries being gitignored.
          # Temporarily remove the gitlink from the index before publish.
          git rm --cached third_party/zvec

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish --force
